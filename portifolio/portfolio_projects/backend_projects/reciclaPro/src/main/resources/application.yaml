spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ReciclaPro 
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect 
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      platform: postgres

api:
  security:
    token: ${JWT_SECRET:12345678}