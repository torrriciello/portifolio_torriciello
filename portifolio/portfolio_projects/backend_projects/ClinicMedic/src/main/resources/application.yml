spring:
  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/MedVoll
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      platform: postgres

api:
  security:
    token: ${JWT_SECRET:12345678}
