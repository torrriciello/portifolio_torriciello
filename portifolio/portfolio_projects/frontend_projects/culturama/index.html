<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/portifólio/culturama/img//culturama-favico.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <title>Formulário de Pesquisa</title>
</head>
<body>
    <main>
        <header>
            <img src="../culturama/img/logo-culturama.png" alt="logo culturama">
            <h1>Formulário Online</h1>
        </header>
        <section>
        <form action="" method="get">

            <!-- DADOS PESSOAIS -->
            <fieldset>
                <legend>Dados Pessoais</legend>

                <label for="userName">Nome</label>
                <input type="text" id="userName" name="userName" required>
                <br><br>

                <label for="userAge">Idade</label>
                <input type="number" id="userAge" name="userAge" min="12" max="100" required>
                <br><br>

                <label for="birthDate">Data de Nascimento</label>
                <input type="date" id="birthDate" name="birthDate" required>
                <br><br>

                <label for="userEmail">Email</label>
                <input type="email" id="userEmail" name="userEmail" required>
                <br><br>

                <label for="userPhone">Telefone</label>
                <input type="tel" id="userPhone" name="userPhone" required 
                    pattern="[0-9]{11}" 
                    placeholder="DDD + número sem espaço ou hífen" aria-describedby="phoneHelp">
                    <small id="phoneHelp">Preencha com 11 dígitos no formato: DDD + número sem espaços ou hífen</small>
                <br><br>

                <label for="userImage">Upload de foto</label>
                <input type="file" id="userImage" name="userImage" accept="image/*" aria-activedescendant="imageHelp">
                <small id="imageHelp">Envie uma foto no formato PNG ou JPEG</small>
            </fieldset>

            <!-- PERFIL -->
            <fieldset>
                <legend>Perfil</legend>

                <p>Gênero:</p><br>

                <input type="radio" id="genderMale" name="userGender" value="masculino">
                <label for="genderMale">Masculino</label>

                <input type="radio" id="genderFemale" name="userGender" value="feminino">
                <label for="genderFemale">Feminino</label>

                <input type="radio" id="genderNotInformed" name="userGender" value="notinformed">
                <label for="genderNotInformed">Prefiro não informar</label>

                <br><br>

                <label for="maritalStatus">Estado Civil:</label>
                <select id="maritalStatus" name="maritalStatus">
                    <option value="">Selecione...</option>
                    <option value="casado">Casado</option>
                    <option value="solteiro">Solteiro</option>
                    <option value="divorciado">Divorciado</option>
                    <option value="uniaoestavel">União Estável</option>
                </select>

                <br><br>

                <label for="state">Estado:</label>
                <select id="state" name="userState" required>
                    <option value="">Selecione...</option>
                    <option value="acre">Acre</option>
                    <option value="alagoas">Alagoas</option>
                    <option value="amapa">Amapá</option>
                    <option value="amazonas">Amazonas</option>
                    <option value="bahia">Bahia</option>
                    <option value="ceara">Ceará</option>
                    <option value="distritofederal">Distrito Federal</option>
                    <option value="espiritosanto">Espírito Santo</option>
                    <option value="goias">Goiás</option>
                    <option value="maranhao">Maranhão</option>
                    <option value="matogrossodosul">Mato Grosso do Sul</option>
                    <option value="matogrosso">Mato Grosso</option>
                    <option value="minasgerais">Minas Gerais</option>
                    <option value="para">Pará</option>
                    <option value="paraiba">Paraíba</option>
                    <option value="parana">Paraná</option>
                    <option value="pernambuco">Pernambuco</option>
                    <option value="piaui">Piauí</option>
                    <option value="riodejaneiro">Rio de Janeiro</option>
                    <option value="riograndedonorte">Rio Grande do Norte</option>
                    <option value="riograndedosul">Rio Grande do Sul</option>
                    <option value="rondonia">Rondônia</option>
                    <option value="roraima">Roraima</option>
                    <option value="santacatarina">Santa Catarina</option>
                    <option value="saopaulo">São Paulo</option>
                    <option value="sergipe">Sergipe</option>
                    <option value="tocantins">Tocantins</option>
                </select>

                <br><br>

                <label for="city">Cidade:</label>
                <input type="text" id="city" name="userCity" required>

            </fieldset> 

            <!-- HÁBITOS -->
            <fieldset>
                <legend>Hábitos</legend>

                <p>Redes Sociais:</p><br>

                <input type="checkbox" id="instagram" name="social" value="instagram">
                <label for="instagram">Instagram</label><br>

                <input type="checkbox" id="facebook" name="social" value="facebook">
                <label for="facebook">Facebook</label><br>

                <input type="checkbox" id="linkedin" name="social" value="linkedin">
                <label for="linkedin">LinkedIn</label><br>

                <input type="checkbox" id="github" name="social" value="github">
                <label for="github">GitHub</label><br>

                <input type="checkbox" id="x" name="social" value="x">
                <label for="x">X</label><br><br>

                <label for="musicStyle">Estilo de Música: </label>
                <input list="styleTypes" id="musicStyle" name="userMusicStyle">
                <datalist id="styleTypes">
                    <option value="Rock"></option>
                    <option value="Pop"></option>
                    <option value="Samba"></option>
                    <option value="Sertajeto"></option>
                </datalist><br><br>
                <label for="favoriteColor">Cor Favorita</label:>
                <input type="color" name="userFavoriteColor" id="favoriteColor">
            </fieldset>

            <!-- Avaliacao -->
            <fieldset>

                <legend>Deixe Sua Opnião</legend>
                <p>O que você acha da qualidade do nosso serviço? </p><br>

                <input type="checkbox" id="otima" name="social" value="otima">
                <label for="otima">Ótima</label><br>

                <input type="checkbox" id="boa" name="social" value="boa">
                <label for="boa">Boa</label><br>

                <input type="checkbox" id="regular" name="social" value="regular">
                <label for="regular">Regular</label><br>

                <input type="checkbox" id="ruim" name="ruim" value="ruim">
                <label for="ruim">Ruim</label><br><br>

                <label for="comment">Escreva a sua opnião: </label><br>
                <textarea id="comment" name="userComment" rows="5" cols="40" placeholder="Digite seu comentário aqui..."></textarea>
            </fieldset><br>

            <fieldset>

                <legend>Confirmações</legend>

                <input type="checkbox" name="userLgpd" id="userLgpdTerm" value="accepted" required>
                <label for="userLgpdTerm">Eu aceito participar da pesquisa</label><br>

                <input type="checkbox" name="userGetResult" id="getResulte" value="accepted">
                <label for="getResulte">Desejo receber o resultado por e-mail</label>

            </fieldset><br>

            <button type="submit" aria-label="Enviar dados do formulário">Enviar</button> 
            <button type="reset"  aria-label="Limpar dados do formulário">Limpar</button> 

        </form>
        </section>
    </main>    

</body>
</html>
