<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <title>Register</title>
    <link rel="stylesheet" href="./register.css" />
  </head>
  <body>
    <main class="container">
      <form>
        <h1>Criar Conta</h1>

        <div class="form-grid">
          <div class="column">
            <div class="column-title">
              <i class="bx bxs-user-detail"></i>
              Dados Pessoais
            </div>

            <div class="input-box">
              <input placeholder="Nome Completo" type="text" required />
              <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
              <input placeholder="Email" type="email" required />
              <i class="bx bxs-envelope"></i>
            </div>

            <div class="input-box">
              <input placeholder="CPF (Apenas números)" type="text" required />
              <i class="bx bxs-id-card"></i>
            </div>

            <div class="input-box">
              <input placeholder="Senha" type="password" required />
              <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="input-box select-box">
              <select required class="select">
                <option value="" disabled selected>Selecione seu Acesso</option>
                <option value="USER">Usuário</option>
                <option value="ADMIN">Administrador</option>
              </select>
            </div>
          </div>

          <div class="column">
            <div class="column-title">
              <i class="bx bxs-map"></i>
              Endereço
            </div>

            <div class="input-box cep-box">
              <input placeholder="CEP" type="text" required />
              <i class="bx bxs-map-pin"></i>
            </div>

            <div class="input-box">
              <input placeholder="Rua / Logradouro" type="text" required />
              <i class="bx bxs-home"></i>
            </div>

            <div class="input-box grid-number-compl">
              <input
                placeholder="Número"
                type="text"
                required
                class="number-input"
              />
            </div>

            <div class="input-box">
              <input placeholder="Bairro" type="text" required />
              <i class="bx bxs-layer"></i>
            </div>

            <div class="input-box">
              <input placeholder="Cidade" type="text" required />
              <i class="bx bxs-city"></i>
            </div>
          </div>
        </div>

        <button type="submit" class="login">Finalizar Cadastro</button>

        <div class="register-link">
          <p>Já tem uma conta? <a href="../login.html">Faça Login</a></p>
        </div>
      </form>
    </main>
  </body>
</html>
